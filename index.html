<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosais</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell" id="appShell">
        <header class="topbar">
            <div class="topbar-left">
                <a class="brand" href="#" aria-label="Mosais home" onclick="goHome()">
                    <span class="brand-mark">m</span>
                </a>
                <div class="search-wrap">
                    <span aria-hidden="true" style="margin-right: 5px;">&#128269;</span>
                    <input id="searchInput" type="search" placeholder="Search Mosais">
                    <div id="searchResults" class="search-results hidden"></div>
                </div>
            </div>
            
            <div class="topbar-right">
                <button class="icon-button hidden" id="friendsButton" title="Friend Requests" onclick="showFriends()"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></button>
                <button class="icon-button hidden" id="messagesButton" title="Messages" onclick="showMessages()"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg></button>
                <button class="icon-button hidden" id="adminButton" title="Admin Dashboard" onclick="showAdmin()"><svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></button>
                <div class="session-pill" id="sessionPill" onclick="handleSessionClick()" style="cursor: pointer;" title="Log in / Log out">
                    <div class="avatar" id="headerAvatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                    <span id="headerName">Guest</span>
                </div>
            </div>
        </header>

        <main class="layout">
            <section class="feed-container">
                <!-- Main Feed -->
                <div id="mainFeedView">
                    <section class="panel composer-panel" id="composerPanel">
                        <form id="postForm" class="composer-form">
                            <div class="composer-top">
                                <div class="avatar" id="composerAvatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                                <input name="body" placeholder="What's on your mind?" required autocomplete="off">
                            </div>
                            <div class="composer-bottom" style="justify-content: flex-end;">
                                <button type="submit" class="primary-btn">Post</button>
                            </div>
                        </form>
                        <p id="postMessage" class="form-message"></p>
                    </section>
                    <div class="feed-list" id="feedList"></div>
                </div>

                <!-- Profile View -->
                <div id="profileFeedView" class="hidden">
                    <div id="selectedUser"></div>
                    
                    <section class="panel profile-panel hidden" id="profilePanel" style="margin-top: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); margin-bottom: 16px; padding-bottom: 12px;">
                            <h3 style="margin: 0;">Edit Your Profile</h3>
                            <button class="chip-button danger" id="profileLogoutBtn" type="button" style="padding: 6px 12px; font-size: 0.9rem;" onclick="logoutUser()">Log Out</button>
                        </div>
                        <form id="profileForm" class="profile-form">
                            <div class="field-grid">
                                <label>Name<input name="name" required></label>
                                <label>Surname<input name="surname" required></label>
                            </div>
                            <label>City<input name="city" required></label>
                            <label>Headline<input name="headline" required></label>
                            <label>Email <span>friends</span><input name="email" type="email" required></label>
                            <label>Phone <span>friends</span><input name="phone" required></label>
                            <label>Bio <span>friends</span><textarea name="bio" rows="3" required></textarea></label>
                            <button type="submit" class="primary-btn" style="width: 100%; margin-top: 8px;">Save Profile</button>
                        </form>
                        <p id="profileMessage" class="form-message"></p>
                    </section>
                    
                    <h3 style="margin-top: 20px;">Posts</h3>
                    <div class="feed-list" id="profileFeedList"></div>
                </div>

                <!-- Friends View -->
                <div id="friendsView" class="hidden panel" style="margin-bottom: 20px;">
                    <h2>Friend Requests</h2>
                    <div id="friendRequestsList"></div>
                </div>

                <!-- Messages View -->
                <div id="messagesView" class="hidden panel" style="margin-bottom: 20px;">
                    <h2>Messages</h2>
                    <div style="display: flex; gap: 16px; margin-top: 16px;">
                        <div id="messageFriendsList" style="flex: 1; border-right: 1px solid var(--line); padding-right: 16px; max-height: 400px; overflow-y: auto;"></div>
                        <div style="flex: 2; display: flex; flex-direction: column;">
                            <div id="activeChat" style="flex: 1; min-height: 300px; max-height: 400px; overflow-y: auto; padding: 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 10px; background: var(--soft);">
                                <p class="muted" style="text-align: center; margin-top: 20px;">Select a friend to start chatting.</p>
                            </div>
                            <form id="messageForm" style="display: flex; gap: 8px;">
                                <input id="messageInput" placeholder="Type a message..." disabled style="flex: 1;" required autocomplete="off">
                                <button type="submit" id="messageSendBtn" class="primary-btn" disabled>Send</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Admin Dashboard View -->
                <div id="adminDashboardView" class="hidden panel">
                    <div class="section-title">
                        <h2>Admin Dashboard</h2>
                        <p class="muted">System overview and management</p>
                    </div>
                    <div class="admin-stats" id="adminStats"></div>
                    <div class="admin-log" id="adminLog"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
